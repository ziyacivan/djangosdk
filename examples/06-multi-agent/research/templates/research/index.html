<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>djangosdk — Multi-Agent Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 1.4rem; color: #333; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.875rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e0e0e0; }
    label { display: block; font-weight: 600; font-size: 0.875rem; color: #333; margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; font-family: inherit; }
    button { padding: 0.75rem 2rem; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
    button:disabled { opacity: 0.5; }
    .pipeline { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .step { padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
    .step.gather { background: #e3f2fd; color: #1565c0; }
    .step.analyze { background: #f3e5f5; color: #6a1b9a; }
    .step.write { background: #e8f5e9; color: #2e7d32; }
    .arrow { color: #999; font-size: 1.2rem; }
    .stage { margin-bottom: 1.5rem; }
    .stage-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-bottom: 0.5rem; }
    .stage-content { white-space: pre-wrap; line-height: 1.6; color: #333; font-size: 0.9rem; }
    #result { display: none; }
    .token-info { font-size: 0.8rem; color: #888; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <h1>djangosdk — Multi-Agent Pipeline</h1>
    <p class="subtitle">Three specialized agents collaborate to produce a research report</p>

    <div class="card">
      <div class="pipeline">
        <div class="step gather">GathererAgent (gpt-4.1-mini)</div>
        <div class="arrow">→</div>
        <div class="step analyze">AnalystAgent (gpt-4.1)</div>
        <div class="arrow">→</div>
        <div class="step write">WriterAgent (gpt-4.1)</div>
      </div>
      <label>Research Topic</label>
      <input id="topic" type="text" placeholder="e.g. The rise of vector databases in 2025–2026" value="The impact of large language models on software development productivity">
      <br>
      <button id="run-btn" onclick="runPipeline()">Run Pipeline</button>
    </div>

    <div id="result">
      <div class="card">
        <div class="stage">
          <div class="stage-label">Stage 1 — Raw Facts (GathererAgent)</div>
          <div id="raw-facts" class="stage-content"></div>
        </div>
      </div>
      <div class="card">
        <div class="stage">
          <div class="stage-label">Stage 2 — Analysis (AnalystAgent)</div>
          <div id="analysis" class="stage-content"></div>
        </div>
      </div>
      <div class="card">
        <div class="stage">
          <div class="stage-label">Stage 3 — Executive Report (WriterAgent)</div>
          <div id="report" class="stage-content"></div>
        </div>
        <div id="token-info" class="token-info"></div>
      </div>
    </div>
  </div>

  <script>
    async function runPipeline() {
      const topic = document.getElementById('topic').value.trim();
      if (!topic) return;
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.textContent = 'Running pipeline... (this takes ~15-30s)';
      document.getElementById('result').style.display = 'none';

      try {
        const res = await fetch('/research/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic }),
        });
        const data = await res.json();

        if (data.error) {
          alert('Error: ' + data.error);
          return;
        }

        document.getElementById('raw-facts').textContent = data.raw_facts;
        document.getElementById('analysis').textContent = data.analysis;
        document.getElementById('report').textContent = data.report;
        document.getElementById('token-info').textContent =
          `Total tokens: ${data.total_usage.prompt_tokens} in / ${data.total_usage.completion_tokens} out`;

        document.getElementById('result').style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Pipeline';
      }
    }
  </script>
</body>
</html>
