<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>djangosdk — Reasoning Models</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 2rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.875rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e0e0e0; }
    label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem; color: #333; }
    textarea { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; resize: vertical; min-height: 100px; font-family: inherit; }
    select { padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 8px; font-size: 0.9rem; }
    button { padding: 0.75rem 1.5rem; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
    button:disabled { opacity: 0.5; }
    .section { margin-bottom: 1rem; }
    .section-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-bottom: 0.5rem; }
    .answer { white-space: pre-wrap; line-height: 1.6; color: #222; }
    .thinking { white-space: pre-wrap; line-height: 1.6; color: #555; font-size: 0.875rem; background: #f9f9f9; border-radius: 8px; padding: 1rem; max-height: 200px; overflow-y: auto; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge.o4 { background: #e8f5e9; color: #2e7d32; }
    .badge.claude { background: #fce4ec; color: #c62828; }
    #result { display: none; }
    .hint { font-size: 0.8rem; color: #888; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>djangosdk — Reasoning Models</h1>
    <p class="subtitle">Compare o4-mini (OpenAI) and Claude 3.7 Sonnet (Anthropic) extended thinking</p>

    <div class="card">
      <div style="display:flex; gap:1rem; align-items:flex-end; margin-bottom:1rem;">
        <div style="flex:1;">
          <label>Problem</label>
          <textarea id="problem" placeholder="Enter a math problem, logic puzzle, or complex question...">If a train leaves Chicago at 60 mph and another leaves New York (800 miles away) at 80 mph, when do they meet and how far from Chicago?</textarea>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:1rem;">
        <div>
          <label>Model</label>
          <select id="model">
            <option value="o4-mini">OpenAI o4-mini (reasoning_effort=high)</option>
            <option value="claude-3-7">Claude 3.7 Sonnet (extended_thinking)</option>
          </select>
        </div>
        <button id="solve-btn" onclick="solve()">Solve</button>
      </div>
      <p class="hint">Note: Reasoning models are slower but significantly more accurate on complex problems.</p>
    </div>

    <div id="result" class="card">
      <div class="section">
        <div class="section-title">Answer <span id="model-badge" class="badge"></span></div>
        <div id="answer" class="answer"></div>
      </div>
      <div id="thinking-section" class="section" style="display:none;">
        <div class="section-title">Thinking Process (Claude extended thinking)</div>
        <div id="thinking" class="thinking"></div>
      </div>
      <div class="section" style="margin-top:1rem;">
        <span id="token-info" class="hint"></span>
      </div>
    </div>
  </div>

  <script>
    async function solve() {
      const problem = document.getElementById('problem').value.trim();
      const model = document.getElementById('model').value;
      const btn = document.getElementById('solve-btn');

      if (!problem) return;
      btn.disabled = true;
      btn.textContent = 'Thinking...';

      document.getElementById('result').style.display = 'none';

      try {
        const res = await fetch('/solve/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, model }),
        });
        const data = await res.json();

        if (data.error) {
          alert('Error: ' + data.error);
          return;
        }

        document.getElementById('answer').textContent = data.answer;

        const badge = document.getElementById('model-badge');
        badge.textContent = model;
        badge.className = 'badge ' + (model === 'o4-mini' ? 'o4' : 'claude');

        const thinkingSection = document.getElementById('thinking-section');
        if (data.thinking) {
          document.getElementById('thinking').textContent = data.thinking;
          thinkingSection.style.display = 'block';
        } else {
          thinkingSection.style.display = 'none';
        }

        document.getElementById('token-info').textContent =
          `Tokens: ${data.usage.prompt_tokens} in / ${data.usage.completion_tokens} out`;

        document.getElementById('result').style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Solve';
      }
    }
  </script>
</body>
</html>
