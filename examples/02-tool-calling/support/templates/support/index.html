<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>djangosdk — Tool-Calling Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
    header { background: #1a1a2e; color: white; padding: 1rem 1.5rem; }
    header h1 { font-size: 1rem; font-weight: 600; }
    header p { font-size: 0.8rem; opacity: 0.7; margin-top: 0.25rem; }
    #messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; }
    .msg.user { background: #1a1a2e; color: white; align-self: flex-end; }
    .msg.assistant { background: white; border: 1px solid #e0e0e0; align-self: flex-start; }
    .tools-badge { font-size: 0.7rem; color: #666; margin-top: 0.4rem; }
    .tools-badge span { background: #eef; border: 1px solid #cce; border-radius: 4px; padding: 1px 6px; margin-right: 4px; }
    form { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; background: white; border-top: 1px solid #e0e0e0; }
    input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    button { padding: 0.75rem 1.5rem; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .hint { padding: 0.5rem 1.5rem; background: #fffde7; font-size: 0.8rem; color: #666; border-top: 1px solid #fff9c4; }
  </style>
</head>
<body>
  <header>
    <h1>djangosdk — Tool-Calling Agent</h1>
    <p>Customer support bot with order lookup, weather check, and cancellation tools</p>
  </header>

  <div class="hint">
    Try: "Where is order ORD-001?" or "Cancel order ORD-002, reason: changed my mind"
  </div>

  <div id="messages"></div>

  <form id="chat-form">
    <input id="message-input" type="text" placeholder="Ask about your order..." autocomplete="off" required>
    <button type="submit">Send</button>
  </form>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message-input');
    const messages = document.getElementById('messages');

    function addMessage(text, role, tools = []) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      if (tools.length) {
        const badge = document.createElement('div');
        badge.className = 'tools-badge';
        badge.innerHTML = 'Tools used: ' + tools.map(t => `<span>${t}</span>`).join('');
        div.appendChild(badge);
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';

      try {
        const res = await fetch('/chat/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        addMessage(data.text, 'assistant', data.tools_called || []);
      } catch (err) {
        addMessage('Error: ' + err.message, 'assistant');
      }
    });
  </script>
</body>
</html>
