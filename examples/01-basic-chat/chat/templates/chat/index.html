<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>djangosdk — Basic Chat</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
    header { background: #092e20; color: white; padding: 1rem 1.5rem; font-size: 1rem; font-weight: 600; }
    #messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 70%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; }
    .msg.user { background: #092e20; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg.assistant { background: white; border: 1px solid #e0e0e0; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg.assistant.streaming { opacity: 0.8; }
    form { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; background: white; border-top: 1px solid #e0e0e0; }
    input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; }
    input:focus { border-color: #092e20; }
    button { padding: 0.75rem 1.5rem; background: #092e20; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>djangosdk — Basic Chat Example</header>

  <div id="messages"></div>

  <form id="chat-form">
    {% csrf_token %}
    <input id="message-input" name="message" type="text" placeholder="Ask anything..." autocomplete="off" required>
    <button id="send-btn" type="submit">Send</button>
  </form>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message-input');
    const btn = document.getElementById('send-btn');
    const messages = document.getElementById('messages');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';
      btn.disabled = true;

      const assistantDiv = addMessage('', 'assistant streaming');
      let fullText = '';

      const formData = new FormData(form);
      formData.set('message', message);

      const res = await fetch('/stream/', {
        method: 'POST',
        body: formData,
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const chunk = line.slice(6);
            if (chunk === '[DONE]') {
              assistantDiv.classList.remove('streaming');
            } else {
              fullText += chunk + ' ';
              assistantDiv.textContent = fullText.trim();
              messages.scrollTop = messages.scrollHeight;
            }
          }
        }
      }

      btn.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
